<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Место — Следы прошлого</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8125rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin: 32px 0 0;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--c-text); }
    .back-link svg { transition: transform var(--transition); }
    .back-link:hover svg { transform: translateX(-3px); }

    .place-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 56px;
      padding: 40px 0 80px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .place-layout { grid-template-columns: 1fr; gap: 32px; }
    }

    /* ── gallery ── */
    .gallery { margin-bottom: 32px; }
    .gallery__main-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--c-accent-soft);
      cursor: zoom-in;
    }
    .gallery__main {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s ease;
    }
    .gallery__main-wrap:hover .gallery__main { transform: scale(1.02); }
    .gallery__zoom-hint {
      position: absolute;
      bottom: 10px; right: 12px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: .72rem;
      letter-spacing: .06em;
      padding: 4px 9px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    .gallery__main-wrap:hover .gallery__zoom-hint { opacity: 1; }
    .gallery__main--placeholder {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      background: var(--c-accent-soft);
      display: flex; align-items: center; justify-content: center;
      color: var(--c-text-muted);
      font-size: .75rem; letter-spacing: .1em; text-transform: uppercase;
    }
    .gallery__thumbs {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .gallery__thumb {
      width: 68px; height: 50px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      cursor: pointer;
      opacity: .5;
      border: 2px solid transparent;
      transition: opacity var(--transition), border-color var(--transition);
    }
    .gallery__thumb.active,
    .gallery__thumb:hover { opacity: 1; border-color: var(--c-accent); }

    /* ── fullscreen lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn .2s ease;
    }
    .lightbox.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox__img {
      max-width: 94vw; max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    .lightbox__close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: #fff; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox__close:hover { background: rgba(255,255,255,.25); }
    .lightbox__prev,
    .lightbox__next {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: #fff; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox__prev:hover,
    .lightbox__next:hover { background: rgba(255,255,255,.25); }
    .lightbox__prev { left: 16px; }
    .lightbox__next { right: 16px; }
    .lightbox__counter {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.6);
      font-size: .8125rem;
    }

    /* ── description ── */
    .place-description {
      font-size: 1rem; line-height: 1.8; color: var(--c-text);
    }
    .place-description p + p { margin-top: 1em; }

    /* ── meta sidebar ── */
    .place-meta { position: sticky; top: calc(var(--nav-h) + 24px); }
    .place-meta__eyebrow {
      font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--c-text-muted); margin-bottom: 10px;
    }
    .place-meta__title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.15; margin-bottom: 20px;
    }

    .meta-row {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: .875rem; color: var(--c-text-muted);
      margin-bottom: 12px; line-height: 1.45;
    }
    .meta-row svg { flex-shrink: 0; margin-top: 2px; }
    .meta-row a { color: var(--c-text); text-decoration: underline; text-underline-offset: 3px; }

    .divider { border: none; border-top: 1px solid var(--c-border); margin: 20px 0; }

    /* tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .tag {
      font-size: .78rem; padding: 4px 10px;
      border: 1px solid var(--c-border);
      border-radius: 20px; color: var(--c-text-muted);
    }

    /* action buttons */
    .place-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-route {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 22px;
      background: var(--c-accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: .8125rem; letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; font-family: var(--font-body);
      transition: background var(--transition);
    }
    .btn-route:hover { background: #3d3d3d; }
    .btn-share {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 22px;
      background: transparent; color: var(--c-text);
      border: 1px solid var(--c-border); border-radius: var(--radius-sm);
      font-size: .8125rem; letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; font-family: var(--font-body);
      transition: border-color var(--transition);
    }
    .btn-share:hover { border-color: var(--c-accent); }

    /* ── model ── */
    .model-section { margin-top: 48px; }
    .model-section__label {
      font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--c-text-muted); margin-bottom: 14px;
    }
    .model-wrapper {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--c-border);
      background: #0d0d0d;
    }
    .model-wrapper model-viewer,
    .model-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }

    /* skeleton */
    .place-skeleton { padding: 40px 0 80px; }
    .place-skeleton__img { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); margin-bottom: 40px; }
  </style>
</head>
<body>

  <nav class="nav"></nav>

  <div class="container">
    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Все места
    </a>
  </div>

  <!-- skeleton -->
  <div class="container place-skeleton" id="skeleton">
    <div class="place-layout">
      <div>
        <div class="skeleton place-skeleton__img"></div>
        <div class="skeleton" style="height:16px;width:80%;border-radius:4px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:16px;width:65%;border-radius:4px"></div>
      </div>
      <div>
        <div class="skeleton" style="height:12px;width:40%;border-radius:4px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:32px;width:90%;border-radius:4px;margin-bottom:20px"></div>
        <div class="skeleton" style="height:12px;width:70%;border-radius:4px;margin-bottom:12px"></div>
        <div class="skeleton" style="height:44px;width:100%;border-radius:4px"></div>
      </div>
    </div>
  </div>

  <!-- content -->
  <div class="container hidden" id="content">
    <div class="place-layout">

      <!-- left -->
      <div>
        <div class="gallery" id="gallery"></div>
        <div class="place-description" id="description"></div>
        <div class="model-section hidden" id="model-section">
          <p class="model-section__label">3D-модель</p>
          <div class="model-wrapper" id="model-wrapper"></div>
        </div>
      </div>

      <!-- right sidebar -->
      <aside class="place-meta">
        <p class="place-meta__eyebrow">Памятное место</p>
        <h1 class="place-meta__title" id="meta-title"></h1>

        <div class="meta-row hidden" id="meta-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="meta-address"></span>
        </div>

        <div class="meta-row hidden" id="meta-opening-address-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          <span id="meta-opening-address"></span>
        </div>

        <div class="meta-row hidden" id="meta-date-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="meta-date"></span>
        </div>

        <div class="meta-row hidden" id="meta-author-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="meta-author"></span>
        </div>

        <div class="tags hidden" id="meta-tags"></div>

        <hr class="divider" />

        <div class="place-actions">
          <button class="btn-route" id="btn-route">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Проложить маршрут
          </button>
          <button class="btn-share" id="btn-share">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Поделиться
          </button>
          <a href="feedback.html" class="btn-share" style="text-decoration:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Оставить отзыв
          </a>
        </div>
      </aside>

    </div>
  </div>

  <!-- error -->
  <div class="container state-error hidden" id="error">
    <h3>Место не найдено</h3>
    <p>Возможно, оно было удалено или ссылка устарела.</p>
    <a href="index.html" class="btn btn--outline mt-16">← Вернуться</a>
  </div>

  <!-- lightbox -->
  <div class="lightbox hidden" id="lightbox">
    <button class="lightbox__close" id="lb-close">✕</button>
    <button class="lightbox__prev hidden" id="lb-prev">‹</button>
    <img class="lightbox__img" id="lb-img" src="" alt="" />
    <button class="lightbox__next hidden" id="lb-next">›</button>
    <span class="lightbox__counter" id="lb-counter"></span>
  </div>

  <footer class="footer"><div class="container">© 2026 Следы прошлого</div></footer>
  <div id="toast" class="toast"></div>
  <script type="module" src="js/place.js"></script>
</body>
</html>
