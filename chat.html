<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат — Следы прошлого</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      min-height: 0;
    }

    /* ── header ── */
    .chat-header {
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }
    .chat-header__title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .chat-header__sub {
      font-size: .8125rem;
      color: var(--c-text-muted);
    }

    /* ── messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    /* welcome screen */
    .chat-welcome {
      margin: auto;
      text-align: center;
      padding: 40px 0;
      max-width: 400px;
    }
    .chat-welcome__icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      color: var(--c-text-muted);
    }
    .chat-welcome__title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    .chat-welcome__sub {
      font-size: .875rem;
      color: var(--c-text-muted);
      line-height: 1.6;
      margin: 0 auto;
    }
    .chat-welcome__hints {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-hint {
      padding: 10px 16px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      font-size: .875rem;
      color: var(--c-text-muted);
      cursor: pointer;
      text-align: left;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
      background: none;
      width: 100%;
    }
    .chat-hint:hover {
      border-color: var(--c-accent);
      color: var(--c-text);
      background: var(--c-accent-soft);
    }

    /* message bubbles */
    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeUp .2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg--user { flex-direction: row-reverse; }

    .msg__avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 500;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text-muted);
    }
    .msg--user .msg__avatar {
      background: var(--c-accent);
      color: #fff;
      border-color: var(--c-accent);
    }

    .msg__bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: .9375rem;
      line-height: 1.7;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
    }
    .msg--user .msg__bubble {
      background: var(--c-accent);
      border-color: var(--c-accent);
      color: #fff;
    }

    /* loading dots */
    .msg__bubble--loading {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--c-text-muted);
      animation: bounce .9s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.7); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1;  }
    }

    /* ── input area ── */
    .chat-input-wrap {
      flex-shrink: 0;
      padding: 16px 0 24px;
      border-top: 1px solid var(--c-border);
    }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      font-size: .9375rem;
      font-weight: 300;
      font-family: var(--font-body);
      color: var(--c-text);
      background: var(--c-surface);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color var(--transition);
    }
    .chat-input:focus { border-color: var(--c-accent); }
    .chat-input::placeholder { color: var(--c-text-muted); }

    .chat-send {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-md);
      background: var(--c-accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), opacity var(--transition);
    }
    .chat-send:hover { background: #3d3d3d; }
    .chat-send:disabled { opacity: .4; cursor: not-allowed; }

    .chat-status {
      margin-top: 8px;
      font-size: .78rem;
      color: var(--c-text-muted);
      min-height: 18px;
      text-align: center;
    }
    .chat-status.error { color: var(--c-danger); }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Следы прошлого</a>
      <ul class="nav__links">
        <li><a href="index.html">Места</a></li>
        <li><a href="map.html">Карта</a></li>
        <li><a href="chat.html">Чат</a></li>
        <li><a href="feedback.html">Отзыв</a></li>
      </ul>
    </div>
  </nav>

  <div class="chat-wrap">
    <div class="chat-header">
      <h1 class="chat-header__title">Исторический гид</h1>
      <p class="chat-header__sub">Задайте вопрос об истории, памятниках или культурном наследии</p>
    </div>

    <div class="chat-messages" id="messages">
      <div class="chat-welcome" id="welcome">
        <svg class="chat-welcome__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <h2 class="chat-welcome__title">С чего начнём?</h2>
        <p class="chat-welcome__sub">Я знаю об исторических местах, событиях, архитектуре и культурном наследии. Спросите меня о чём угодно из этих тем.</p>
        <div class="chat-welcome__hints">
          <button class="chat-hint">Расскажи о Колизее в Риме</button>
          <button class="chat-hint">Что произошло в Сталинградской битве?</button>
          <button class="chat-hint">Какие памятники есть в Петербурге?</button>
        </div>
      </div>
    </div>

    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Напишите вопрос об истории…"
          rows="1"
          maxlength="2000"
        ></textarea>
        <button class="chat-send" id="send-btn" disabled aria-label="Отправить">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="chat-status" id="chat-status"></p>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
