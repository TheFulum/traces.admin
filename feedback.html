<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отзыв — Следы прошлого</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .feedback-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .feedback-header {
      margin-bottom: 40px;
    }
    .feedback-header__eyebrow {
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 10px;
    }
    .feedback-header__title { margin-bottom: 8px; }
    .feedback-header__sub {
      font-size: .9375rem;
      color: var(--c-text-muted);
    }

    .feedback-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 32px;
    }

    /* star rating block */
    .rating-label {
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 10px;
      display: block;
    }
    .stars {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      flex-direction: row;
    }
    .stars input { display: none; }
    .star-label {
      font-size: 2rem;
      color: var(--c-border);
      cursor: pointer;
      transition: color var(--transition), transform var(--transition);
      line-height: 1;
      user-select: none;
    }
    .star-label:hover { transform: scale(1.15); }

    /* highlight: hovered star and all before it */
    .stars:has(.star-label:nth-child(2):hover) .star-label:nth-child(n+2),
    .stars:has(.star-label:nth-child(3):hover) .star-label:nth-child(n+2):nth-child(-n+3),
    .stars:has(.star-label:nth-child(4):hover) .star-label:nth-child(n+2):nth-child(-n+4),
    .stars:has(.star-label:nth-child(5):hover) .star-label:nth-child(n+2):nth-child(-n+5),
    .stars:has(.star-label:nth-child(6):hover) .star-label:nth-child(n+2) { color: var(--c-star); }

    /* checked states */
    .stars:has(#r1:checked) .star-label:nth-child(2) { color: var(--c-star); }
    .stars:has(#r2:checked) .star-label:nth-child(n+2):nth-child(-n+3) { color: var(--c-star); }
    .stars:has(#r3:checked) .star-label:nth-child(n+2):nth-child(-n+4) { color: var(--c-star); }
    .stars:has(#r4:checked) .star-label:nth-child(n+2):nth-child(-n+5) { color: var(--c-star); }
    .stars:has(#r5:checked) .star-label:nth-child(n+2) { color: var(--c-star); }

    .rating-text {
      font-size: .8125rem;
      color: var(--c-text-muted);
      margin-top: -20px;
      margin-bottom: 28px;
      min-height: 18px;
      transition: opacity var(--transition);
    }

    .form-actions {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .form-status {
      font-size: .8125rem;
      color: var(--c-text-muted);
      min-height: 18px;
    }
    .form-status.error   { color: var(--c-danger); }
    .form-status.success { color: #2d6a4f; }

    /* success state */
    .feedback-success {
      text-align: center;
      padding: 48px 32px;
    }
    .feedback-success__icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--c-accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--c-text);
    }
    .feedback-success__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .feedback-success__sub {
      font-size: .9375rem;
      color: var(--c-text-muted);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Следы прошлого</a>
      <ul class="nav__links">
        <li><a href="index.html">Места</a></li>
        <li><a href="map.html">Карта</a></li>
        <li><a href="chat.html">Чат</a></li>
        <li><a href="feedback.html">Отзыв</a></li>
      </ul>
    </div>
  </nav>

  <div class="feedback-wrap">
    <div class="feedback-header">
      <p class="feedback-header__eyebrow">Обратная связь</p>
      <h1 class="feedback-header__title">Оставить отзыв</h1>
      <p class="feedback-header__sub">Ваше мнение помогает нам улучшать приложение.</p>
    </div>

    <div class="feedback-card" id="form-card">
      <!-- star rating -->
      <span class="rating-label">Оценка</span>
      <div class="stars" id="stars-row">
        <input type="radio" name="rating" id="r1" value="1" />
        <label class="star-label" for="r1">★</label>
        <input type="radio" name="rating" id="r2" value="2" />
        <label class="star-label" for="r2">★</label>
        <input type="radio" name="rating" id="r3" value="3" />
        <label class="star-label" for="r3">★</label>
        <input type="radio" name="rating" id="r4" value="4" />
        <label class="star-label" for="r4">★</label>
        <input type="radio" name="rating" id="r5" value="5" />
        <label class="star-label" for="r5">★</label>
      </div>
      <p class="rating-text" id="rating-text"></p>

      <!-- email -->
      <div class="form-group">
        <label class="form-label" for="email">Электронная почта</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="you@example.com"
          maxlength="254"
          autocomplete="email"
        />
      </div>

      <!-- message -->
      <div class="form-group">
        <label class="form-label" for="message">Сообщение</label>
        <textarea
          id="message"
          class="form-control"
          placeholder="Поделитесь впечатлениями или предложениями…"
          maxlength="2000"
          rows="5"
        ></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn--primary" id="submit-btn">Отправить</button>
        <span class="form-status" id="form-status"></span>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">© 2025 Следы прошлого</div>
  </footer>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/feedback.js"></script>
</body>
</html>
