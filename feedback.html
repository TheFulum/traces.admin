<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отзыв — Следы прошлого</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .feedback-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .feedback-header { margin-bottom: 40px; }
    .feedback-header__eyebrow {
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 10px;
    }
    .feedback-header__title { margin-bottom: 8px; }
    .feedback-header__sub { font-size: .9375rem; color: var(--c-text-muted); }

    .feedback-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 32px;
    }

    /* ── stars ── */
    .rating-label {
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 10px;
      display: block;
    }
    .stars {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
      line-height: 1;
    }
    .star {
      font-size: 2.2rem;
      color: #d9d4cc;
      cursor: pointer;
      padding: 0 3px;
      background: none;
      border: none;
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .star:hover { transform: scale(1.15); }
    .star.on { color: #b8860b; }

    .rating-text {
      font-size: .8125rem;
      color: var(--c-text-muted);
      margin-bottom: 24px;
      min-height: 18px;
    }

    .form-actions {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .form-status { font-size: .8125rem; min-height: 18px; }
    .form-status.error   { color: var(--c-danger); }
    .form-status.success { color: #2d6a4f; }

    .feedback-success {
      text-align: center;
      padding: 48px 32px;
    }
    .feedback-success__icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--c-accent-soft);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .feedback-success__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .feedback-success__sub {
      font-size: .9375rem;
      color: var(--c-text-muted);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <nav class="nav"></nav>

  <div class="feedback-wrap">
    <div class="feedback-header">
      <p class="feedback-header__eyebrow">Обратная связь</p>
      <h1 class="feedback-header__title">Оставить отзыв</h1>
      <p class="feedback-header__sub">Ваше мнение помогает нам улучшать приложение.</p>
    </div>

    <div class="feedback-card" id="form-card">

      <span class="rating-label">Оценка</span>
      <div class="stars" id="stars">
        <button type="button" class="star" data-v="1">★</button>
        <button type="button" class="star" data-v="2">★</button>
        <button type="button" class="star" data-v="3">★</button>
        <button type="button" class="star" data-v="4">★</button>
        <button type="button" class="star" data-v="5">★</button>
      </div>
      <p class="rating-text" id="rating-text"></p>

      <div class="form-group">
        <label class="form-label" for="email">Электронная почта</label>
        <input type="email" id="email" class="form-control"
          placeholder="you@example.com" maxlength="254" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="message">Сообщение</label>
        <textarea id="message" class="form-control"
          placeholder="Поделитесь впечатлениями или предложениями…"
          maxlength="2000" rows="5"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn--primary" id="submit-btn">Отправить</button>
        <span class="form-status" id="form-status"></span>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">© 2025 Следы прошлого</div>
  </footer>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/feedback.js"></script>
</body>
</html>
